# hal0 profile catalog — bench-tuned backend templates.
# A profile = (image, flags, mtp, device_class, backend).  Slots reference a
# profile by name; the profile supplies the container image + flag bundle and
# the GPU runtime (backend = rocm|vulkan).  Slugs are backend-agnostic workload
# names — the `backend` field, not the slug, carries the ROCm/Vulkan choice.
# See the container-runtime design doc (§1) for the layering rationale.
#
# NOTE: this file is OPTIONAL.  hal0-api returns these seed profiles as built-in
# defaults when the file is absent (SEED_PROFILES in schema.py).
# Keep this file identical to SEED_PROFILES to avoid silent drift.

[profile.rocm]
# Standard ROCm GPU template (ace-saber A3B MoE etc). ~52.8 tok/s gen, 131k ctx.
# Broad-compatibility "std" — must-have defaults (-fa, KV quant, --no-mmap).
image        = "ghcr.io/hal0ai/amd-strix-halo-toolboxes:rocm-7.2.4-rocmfp4-server"
flags        = "-fa on -ctk q8_0 -ctv q8_0 -b 512 -ub 512 --parallel 1 --threads 8 --no-mmap"
mtp          = false
device_class = "gpu"
backend      = "rocm"
intent       = "MoE agents"
quant        = "FP4"

[profile.rocm-dnse]
# ROCm + MTP draft-mtp, q8 KV (dense chat, qwopus 27B). Bench-tuned throughput
# flags (-b 8192/-ub 2048, 16+32 threads, poll). KV is q8_0 (k+v): near-lossless
# (<0.1% PPL vs f16) where q4 V-cache measurably hurts tool-use on high-GQA Qwen;
# symmetric q8 keeps the fast fused flash-attn kernel on AMD HIP (asymmetric K!=V
# silently falls back); ~+4 GB at 164k ctx is trivial on 128 GB unified.
image        = "ghcr.io/hal0ai/amd-strix-halo-toolboxes:rocm-7.2.4-rocmfp4-server"
flags        = "-fa on -ctk q8_0 -ctv q8_0 -b 8192 -ub 2048 --parallel 1 --threads 16 --threads-batch 32 --no-mmap --poll 100 --poll-batch 1"
mtp          = true
device_class = "gpu"
backend      = "rocm"
intent       = "Dense + MTP · q8 KV"
quant        = "FP4"

[profile.rocm-moe]
# ROCm + MTP draft-mtp for MoE (crown-halo / ace-saber 35B-A3B). Bench-tuned:
# q8 KV, -b 8192/-ub 2048, 16+32 threads, poll, jinja. q4-vs-f16 was within noise
# on crown-halo (decode is MoE/MTP-bound, not KV-bound), so q8 buys quality for
# ~free — symmetric q8 keeps the fused FA path on AMD and avoids q4's ~37% decode
# slowdown at long ctx. Re-bench tok/s after switching.
image        = "ghcr.io/hal0ai/amd-strix-halo-toolboxes:rocm-7.2.4-rocmfp4-server"
flags        = "-fa on -ctk q8_0 -ctv q8_0 -b 8192 -ub 2048 --parallel 1 --threads 16 --threads-batch 32 --no-mmap --poll 100 --poll-batch 1 --jinja"
mtp          = true
device_class = "gpu"
backend      = "rocm"
intent       = "MoE + MTP · q8 KV"
quant        = "FP4"

[profile.vulkan]
# Standard Vulkan GPU template (fallback / non-FP4 models). Vulkan-radv, no FP4/MTP.
image        = "ghcr.io/hal0ai/amd-strix-halo-toolboxes:vulkan-radv-server"
flags        = "-fa on -b 512 -ub 512 --parallel 1 --threads 8 --no-mmap"
mtp          = false
device_class = "gpu"
backend      = "vulkan"
intent       = "Vulkan std · fallback"
quant        = "Q4_K_M"

[profile.flm]
# NPU LLM/trio slot (FastFlowLM). Flags are built by FLMProvider.container_spec,
# not by this profile — image pin only. No backend (device_class drives display).
image        = "ghcr.io/hal0ai/hal0-toolbox-flm:0.9.43"
flags        = ""
mtp          = false
device_class = "npu"
intent       = "FLM NPU inference"
quant        = "W4ABF16"

[profile.tts]
# CPU TTS slot (kokoro-onnx). No GPU devices. Flags feed kokoro_server.py;
# --model_path points at the shared model store so no download on start.
image        = "ghcr.io/hal0ai/hal0-toolbox-kokoro:v1"
flags        = "--model_path /mnt/ai-models/local/kokoro-v1/kokoro-onnx"
mtp          = false
device_class = "cpu"
intent       = "TTS · Kokoro"
quant        = ""

[profile.comfyui]
# Image-gen slot (ComfyUI on ROCm, kyuz0 Strix Halo build). Exclusive-GPU:
# the GpuArbiter stops LLM GPU slots while img runs (Phase D, #599).
image        = "docker.io/kyuz0/amd-strix-halo-comfyui@sha256:0066678ae9043f69a1c8c7699e70626ceffd35c1a8ca03227a05640ad0241ed2"
flags        = "--disable-mmap --bf16-vae --cache-none"
mtp          = false
device_class = "img"
intent       = "Image generation"
quant        = ""
