[build-system]
requires = ["hatchling>=1.21"]
build-backend = "hatchling.build"

[project]
name = "hal0"
version = "0.0.0"
description = "Open-source home AI inference platform"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "hal0 contributors" }]
keywords = ["ai", "llm", "inference", "openai-compatible", "homeai"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: End Users/Desktop",
  "Intended Audience :: System Administrators",
  "Operating System :: POSIX :: Linux",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

dependencies = [
  "fastapi>=0.115",
  "uvicorn[standard]>=0.32",
  "httpx>=0.28",
  "pydantic>=2.10",
  "pydantic-settings>=2.6",
  "typer>=0.15",
  "structlog>=24.4",
  "sse-starlette>=2.1",
  "tomli-w>=1.0",
  "rich>=13.9",
  # Argon2id hashing for the bearer-token store at /etc/hal0/tokens.toml.
  # Caddy basic_auth uses bcrypt (generated by `caddy hash-password`) for
  # the admin user — argon2-cffi is hal0-internal only.
  "argon2-cffi>=23.1",
  # ADR-0001 Child A (#55): owner password is bcrypt-hashed so it matches
  # the format Caddy basic_auth produces, easing the Child B migration
  # from edge basicauth to FastAPI password auth.
  "bcrypt>=4.0",
  # ADR-0001 Child A (#55): session cookie carries a signed JWT (HS256)
  # so a process restart doesn't sign every browser session out. The
  # signing key lives under HAL0_HOME and is generated on first use.
  "PyJWT>=2.8",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.3",
  "pytest-asyncio>=0.24",
  "pytest-cov>=6.0",
  "ruff>=0.8",
  "mypy>=1.13",
  "httpx>=0.28",
]

[project.scripts]
hal0 = "hal0.cli.main:app"

[project.urls]
Homepage = "https://hal0.dev"
Repository = "https://github.com/hal0ai/hal0"

[tool.hatch.build.targets.wheel]
packages = ["src/hal0"]

[tool.ruff]
line-length = 100
target-version = "py311"
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "SIM", "RUF"]
ignore = [
  "E501",  # line length (handled by formatter)
  "B008",  # function calls in argument defaults — Typer's documented API for Option/Argument
]

[tool.ruff.format]
quote-style = "double"

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = "-ra --strict-markers"

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_configs = true
