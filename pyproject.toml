[build-system]
requires = ["hatchling>=1.21"]
build-backend = "hatchling.build"

[project]
name = "hal0"
version = "0.2.0-alpha.3"
description = "Open-source home AI inference platform"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "hal0 contributors" }]
keywords = ["ai", "llm", "inference", "openai-compatible", "homeai"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: End Users/Desktop",
  "Intended Audience :: System Administrators",
  "Operating System :: POSIX :: Linux",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

dependencies = [
  "fastapi>=0.115",
  "uvicorn[standard]>=0.32",
  "httpx>=0.28",
  "pydantic>=2.10",
  "pydantic-settings>=2.6",
  "typer>=0.15",
  "structlog>=24.4",
  "sse-starlette>=2.1",
  "tomli-w>=1.0",
  "rich>=13.9",
  # Argon2id hashing for the bearer-token store at /etc/hal0/tokens.toml.
  # Caddy basic_auth uses bcrypt (generated by `caddy hash-password`) for
  # the admin user — argon2-cffi is hal0-internal only.
  "argon2-cffi>=23.1",
  # ADR-0001 Child A (#55): owner password is bcrypt-hashed so it matches
  # the format Caddy basic_auth produces, easing the Child B migration
  # from edge basicauth to FastAPI password auth.
  "bcrypt>=4.0",
  # ADR-0001 Child A (#55): session cookie carries a signed JWT (HS256)
  # so a process restart doesn't sign every browser session out. The
  # signing key lives under HAL0_HOME and is generated on first use.
  "PyJWT>=2.8",
  # ADR-0005 (Phase 8): Cognee is hal0's embedded memory engine.
  # Apache 2.0; pulls aiosqlite + lancedb + kuzu underneath. Verified
  # 2026-05-22 to NOT pull torch / nvidia / cuda wheels on a CPU-only
  # install (lancedb + pylance are Rust-built and ship CPU wheels).
  # Pinned to 1.0.7 (released 2026-05-05, >2 weeks of soak before
  # adoption); pin window kept tight per ADR-0005 §"Consequences" —
  # Cognee's Python API is now the upstream contract for /mcp/memory.
  "cognee==1.0.7",
  # ADR-0005 §1: fastembed gives Cognee a CPU-only ONNX embedding
  # backend so we don't require an OpenAI key on a fresh hal0 install.
  # Pulls onnxruntime, NOT torch/CUDA. Bundled with cognee but only
  # via the [fastembed] extra, so we list it explicitly.
  "fastembed>=0.8,<1.0",
  # ADR-0004 (Phase 8): hal0 ships /mcp/admin + /mcp/memory MCP servers.
  # MIT-licensed Python SDK; consumed by hal0.mcp.* — required at
  # import time, hence core (not optional).
  "mcp==1.27.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.3",
  "pytest-asyncio>=0.24",
  "pytest-cov>=6.0",
  "ruff>=0.8",
  "mypy>=1.13",
  "httpx>=0.28",
  # Runtime deps of the in-container moonshine_server, loaded via
  # importlib by tests/providers/test_moonshine_server.py. Not on the
  # hal0 production path — only the toolbox image needs them at runtime
  # — but the test suite exercises the redaction logic from harness
  # finding #14.
  "numpy>=2.0",
  "soundfile>=0.12",
  # FastAPI's File()/UploadFile/Form() construction (used by the
  # moonshine_server multipart route) requires python-multipart at
  # import time. Same scope as numpy + soundfile above — toolbox-only
  # at runtime, but the test suite imports the FastAPI app.
  "python-multipart>=0.0.9",
]

[project.scripts]
hal0 = "hal0.cli.main:app"

[project.urls]
Homepage = "https://hal0.dev"
Repository = "https://github.com/hal0ai/hal0"

[tool.hatch.build.targets.wheel]
packages = ["src/hal0"]

[tool.ruff]
line-length = 100
target-version = "py311"
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "SIM", "RUF"]
ignore = [
  "E501",  # line length (handled by formatter)
  "B008",  # function calls in argument defaults — Typer's documented API for Option/Argument
]

[tool.ruff.format]
quote-style = "double"

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = "-ra --strict-markers"
markers = [
  "slow: tests that take >1s wall-clock (Cognee fixtures, etc.)",
]

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_configs = true
