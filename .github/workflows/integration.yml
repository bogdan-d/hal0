name: Integration (tier β)

# Slot integration tests on a fresh ubuntu-latest runner.  Builds the
# CPU-only toolbox image (PLAN §10.2 "Vulkan-CPU baseline" — same
# llama.cpp, compiled without GGML_VULKAN so a model actually loads on
# a runner with no GPU and no working Vulkan ICD), pulls a tiny GGUF,
# installs the hal0-slot@.service template via installer/install.sh,
# and runs the gated cases in tests/slots/test_integration.py.
#
# History: between 2026-05-18 and 2026-05-21 this job built the Vulkan
# toolbox and ran it on the runner.  llama-server's Vulkan backend
# couldn't usefully load model weights against Mesa's llvmpipe, so the
# container came up with /v1/models empty and the slot resolved to IDLE
# rather than READY (manager.py:1422-1515).  After dc71fcf landed the
# modelless-READY adoption guard, IDLE became the durable state and
# all three integration cases asserted READY.  cpu.Dockerfile gives
# the integration tier a build that actually serves on CPU.
#
# Wall-clock budget: ≤12 min/run (PLAN §10.2).  The toolbox build is
# layer-cached against GHA so successive runs hit ~3-4 min when
# Dockerfiles are unchanged.

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "src/hal0/**"
      - "tests/slots/**"
      - "tests/openwebui/**"
      - "packaging/**"
      - "installer/**"
      - ".github/workflows/integration.yml"

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  slot-integration:
    name: Slot integration (Vulkan-CPU baseline)
    runs-on: ubuntu-latest
    timeout-minutes: 12

    env:
      # Smallest production-quality GGUF that exercises the full slot
      # lifecycle without exhausting the runner's tmpfs.
      HF_REPO: Qwen/Qwen2.5-0.5B-Instruct-GGUF
      HF_FILE: qwen2.5-0.5b-instruct-q4_k_m.gguf
      MODEL_ID: qwen3-0.5b-q4_k_m
      HAL0_CI_SLOT: ci-test
      HAL0_CI_MODEL: qwen3-0.5b-q4_k_m
      MODEL_CACHE_DIR: /tmp/hal0-ci-models

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install hal0 (editable + dev extras)
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Verify Docker on runner
        run: |
          docker version
          docker info --format '{{.ServerVersion}}'

      - name: Set up Docker Buildx (for layer caching)
        uses: docker/setup-buildx-action@v3

      - name: Build hal0-toolbox-cpu (Vulkan-CPU baseline)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packaging/toolbox/cpu.Dockerfile
          tags: hal0-toolbox-cpu:ci
          push: false
          load: true
          cache-from: type=gha,scope=toolbox-cpu-ci
          cache-to: type=gha,scope=toolbox-cpu-ci,mode=max

      - name: Smoke-test toolbox image (CPU llama.cpp)
        run: |
          # CPU-only build: llama-server runs without any GPU loader.
          # We accept any non-error exit from --help as proof-of-life.
          # ENTRYPOINT is llama-server itself (provider contract — see
          # packaging/toolbox/cpu.Dockerfile), so we override it for the
          # shell wrapper.
          docker run --rm --entrypoint /bin/bash hal0-toolbox-cpu:ci -c \
            'which llama-server && llama-server --help >/dev/null'

      - name: Cache model GGUF
        id: model-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.MODEL_CACHE_DIR }}
          key: hf-${{ env.HF_REPO }}-${{ env.HF_FILE }}-v1

      - name: Download model GGUF
        if: steps.model-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p "${MODEL_CACHE_DIR}"
          curl -fsSL -o "${MODEL_CACHE_DIR}/${HF_FILE}" \
            "https://huggingface.co/${HF_REPO}/resolve/main/${HF_FILE}"

      - name: Install hal0 (dev install, no auto-start)
        # Lays down /etc/systemd/system/hal0-slot@.service + python entry
        # points so the integration tests can talk to systemd directly.
        run: sudo bash installer/install.sh --no-start
        env:
          HAL0_NO_PROBE: "1"

      - name: Seed model into hal0 registry
        run: |
          sudo mkdir -p /var/lib/hal0/models /var/lib/hal0/registry
          sudo cp "${MODEL_CACHE_DIR}/${HF_FILE}" "/var/lib/hal0/models/${MODEL_ID}.gguf"
          sudo tee "/var/lib/hal0/registry/${MODEL_ID}.toml" >/dev/null <<TOML
          id = "${MODEL_ID}"
          path = "/var/lib/hal0/models/${MODEL_ID}.gguf"
          provider = "llama-server"
          context_size = 512
          TOML

      - name: Pin local toolbox image
        run: |
          # The slot manager's LlamaServerProvider.image_ref() reads
          # HAL0_TOOLBOX_IMAGE_VULKAN from the *process* environment
          # (llama_server.py:348).  Both consumers need it:
          #   - The pytest process below (it resolves the image at
          #     render-override time, before systemctl start hits docker).
          #   - The hal0-api systemd unit (production path; not used by
          #     these tests, but the api.env line matches how a real
          #     install would pin the image so we keep both in sync).
          sudo mkdir -p /etc/hal0
          echo "HAL0_TOOLBOX_IMAGE_VULKAN=hal0-toolbox-cpu:ci" \
              | sudo tee -a /etc/hal0/api.env

      - name: Confirm hal0-slot@.service template is visible to systemd
        run: |
          sudo systemctl daemon-reload
          systemctl list-unit-files hal0-slot@.service --no-legend

      - name: Run integration tests
        # The tests' module-level skipif now checks
        # `systemctl list-unit-files hal0-slot@.service` and will collect
        # all three cases on this runner.
        #
        # HAL0_TOOLBOX_IMAGE_VULKAN must reach the pytest process because
        # LlamaServerProvider.image_ref() bakes the resolved image into
        # the rendered override.conf at SlotManager.load() time —
        # /etc/hal0/api.env only flows into the hal0-api systemd unit,
        # which these tests bypass.
        env:
          HAL0_TOOLBOX_IMAGE_VULKAN: hal0-toolbox-cpu:ci
        run: |
          . .venv/bin/activate
          sudo --preserve-env=PATH,VIRTUAL_ENV,HAL0_CI_SLOT,HAL0_CI_MODEL,HAL0_TOOLBOX_IMAGE_VULKAN \
              .venv/bin/pytest tests/slots/test_integration.py -v -m integration

      - name: Capture journald on failure
        if: failure()
        run: |
          sudo journalctl -u 'hal0-api*' --no-pager -n 500 > journal-api.log || true
          sudo journalctl -u 'hal0-slot@*' --no-pager -n 1000 > journal-slot.log || true

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-logs
          path: |
            journal-api.log
            journal-slot.log
          if-no-files-found: ignore

  openwebui-prewire-smoke:
    # Proves the bundled OpenWebUI install actually talks to hal0:
    # writes /etc/hal0/openwebui.env via env_writer, boots
    # ghcr.io/open-webui/open-webui:main against a real hal0-api
    # subprocess, polls /api/models until OpenWebUI advertises the
    # hal0-served model.  See tests/openwebui/test_prewire_smoke.py.
    name: OpenWebUI prewire smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Independent of slot-integration — they don't share state and the
    # OpenWebUI image pull dominates wall-clock, so running them in
    # parallel cuts critical path.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install hal0 (editable + dev extras)
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Verify Docker on runner
        run: |
          docker version
          docker info --format '{{.ServerVersion}}'

      - name: Pre-pull OpenWebUI image
        # Cache the heavy layer step outside the pytest timeout so a
        # slow registry pull doesn't get billed against the test.
        run: docker pull ghcr.io/open-webui/open-webui:main

      - name: Run OpenWebUI prewire smoke test
        run: |
          . .venv/bin/activate
          pytest tests/openwebui/test_prewire_smoke.py -v -m integration

      - name: Capture container logs on failure
        if: failure()
        run: |
          # Catch any lingering openwebui smoke container — the fixture
          # tears them down on success but a hard pytest fail (timeout,
          # SIGKILL) can leak one.
          docker ps -a --filter "name=hal0-openwebui-smoke-" --format '{{.ID}} {{.Names}}' \
              | tee leaked-containers.txt || true
          for cid in $(docker ps -aq --filter "name=hal0-openwebui-smoke-"); do
              docker logs --tail 500 "$cid" > "openwebui-$cid.log" 2>&1 || true
              docker rm -f "$cid" || true
          done

      - name: Upload OpenWebUI logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: openwebui-smoke-logs
          path: |
            openwebui-*.log
            leaked-containers.txt
          if-no-files-found: ignore
